<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
    .bloco {
        display: block;
        background-color: lightblue;
    }
    .linha {
        display: inline;
        background-color: lightgreen;
    }
    .relativo {
        position: relative;
        background-color: lightcoral;
    }
    .absoluto {
        position: absolute;
        background-color: yellow;
    }
</style>
</head>
<body>
    <div class="bloco">Bloco</div>
    <div class="linha">Linha 1</div>
    <div class="linha">Linha 2</div>
    <div class="bloco relativo">Posição Relativa</div>
    <div class="bloco absoluto">Posição Absoluta</div>
</body>
</html>
