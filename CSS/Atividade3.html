<!--As três maneiras de usar o CSS-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gustavo Pandini</title>
    <!--CSS Externo: Os estilos são escritos em um arquivo separado com extensão .css, e vinculados ao HTML usando a tag <link> dentro do <head>.-->
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <!--CSS Inline = Os estilos são aplicados diretamente na tag HTML através do atributo style.-->
    <p style="color: blue;">Texto azul</p>

    <!--CSS Interno = As regras são escritas dentro da tag <style>-->
    <head>
    <style>
        p { color: blue; }
    </style>
    </head>


</body>
</html>
