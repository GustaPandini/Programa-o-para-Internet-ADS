<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
    body { margin: 0; padding: 0; }
    .ceu {
        width: 100%;
        height: 100vh;
        background: linear-gradient(to bottom, #87CEEB, #ffffff); /* [cite: 154] */
        position: relative; /* [cite: 152] */
        overflow: hidden;
    }
    .nuvem {
        width: 150px;
        height: 50px;
        background-color: white;
        border-radius: 50px; /* [cite: 149] */
        box-shadow: 10px 10px 5px rgba(0,0,0,0.1); /* [cite: 149] */
        position: absolute;
        top: 50px;
        animation: moverNuvem 15s linear infinite; /* [cite: 150] */
    }
    .barco {
        width: 100px;
        height: 100px;
        background-color: brown; /* Substitua por background-image  */
        position: absolute;
        bottom: 80px;
        z-index: 2; /* [cite: 153] */
        animation: moverBarco 10s linear infinite, balancar 2s ease-in-out infinite alternate; /* [cite: 145] */
    }
    .mar {
        width: 100%;
        height: 100px;
        background-color: #1E90FF;
        position: absolute;
        bottom: 0;
        z-index: 3; /* [cite: 153] */
    }
    .mar::before { /* [cite: 147] */
        content: '';
        position: absolute;
        top: -20px;
        width: 100%;
        height: 40px;
        background: radial-gradient(circle, #1E90FF 20px, transparent 21px) repeat-x;
        background-size: 40px 40px;
    }

    @keyframes moverNuvem {
        0% { left: -200px; }
        100% { left: 100%; }
    }
    @keyframes moverBarco {
        0% { left: -150px; }
        100% { left: 100%; }
    }
    @keyframes balancar {
        0% { transform: translateY(0px) rotate(0deg); }
        100% { transform: translateY(10px) rotate(5deg); }
    }
</style>
</head>
<body>
    <div class="ceu">
        <div class="nuvem"></div>
        <div class="barco"></div>
        <div class="mar"></div>
    </div>
</body>
</html>
