<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
    }
    .container {
        display: flex;
        width: 100%;
        height: 100%;
    }
    .imagem {
        flex: 1;
        background-size: cover;
        background-position: center;
        transition: flex 0.5s ease;
        cursor: pointer;
    }
    .imagem:hover {
        flex: 3;
    }
    
    .img1 { background-image: url('https://picsum.photos/800/600?random=1'); }
    .img2 { background-image: url('https://picsum.photos/800/600?random=2'); }
    .img3 { background-image: url('https://picsum.photos/800/600?random=3'); }
    .img4 { background-image: url('https://picsum.photos/800/600?random=4'); }
</style>
</head>
<body>
    <div class="container">
        <div class="imagem img1"></div>
        <div class="imagem img2"></div>
        <div class="imagem img3"></div>
        <div class="imagem img4"></div>
    </div>
</body>
</html>
