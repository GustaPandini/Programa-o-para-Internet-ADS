<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
    body {
        margin: 0;
        display: flex;
        height: 100vh;
        width: 100vw;
        font-family: Arial, sans-serif;
        color: white;
        font-weight: bold;
        text-align: center;
    }
    .navegacao {
        background-color: #f38137;
        width: 20%;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .direita {
        display: flex;
        flex-direction: column;
        width: 80%;
    }
    .cabecalho {
        background-color: #0fb9df;
        height: 20%;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .conteudo {
        background-color: #6a4c9c;
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .rodape {
        background-color: #0fb9df;
        height: 15%;
        display: flex;
        align-items: center;
        justify-content: center;
    }
</style>
</head>
<body>
    <div class="navegacao">NAVEGAÇÃO</div>
    <div class="direita">
        <div class="cabecalho">CABEÇALHO</div>
        <div class="conteudo">CONTEÚDO</div>
        <div class="rodape">RODAPÉ</div>
    </div>
</body>
</html>
