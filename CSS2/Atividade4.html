<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
    body { 
        margin: 10px; 
        font-family: Arial, sans-serif; 
        text-align: center; 
        font-weight: bold;
    }
    .container {
        display: grid;
        grid-template-columns: 150px 1fr 150px;
        gap: 10px;
        grid-template-areas:
            "header header header"
            "left banner right"
            "left main right"
            "left low right"
            "footer footer footer";
    }
    .box { 
        padding: 20px; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
    }
    
    .header { grid-area: header; background-color: #f0a500; }
    .banner { grid-area: banner; background-color: #d9534f; color: white; }
    .left { grid-area: left; background-color: #28a745; color: white; }
    .main { grid-area: main; background-color: #007bff; color: white; min-height: 400px; }
    .right { grid-area: right; background-color: #f0a500; }
    .low { grid-area: low; background-color: #28a745; color: white; }
    .footer { grid-area: footer; background-color: #007bff; color: white; }

    @media screen and (max-width: 768px) {
        .container {
            grid-template-columns: 1fr;
            grid-template-areas:
                "header"
                "banner"
                "left"
                "main"
                "right"
                "low"
                "footer";
        }
    }
</style>
</head>
<body>
    <div class="container">
        <div class="box header">Header</div>
        <div class="box banner">Banner</div>
        <div class="box left">Left Aside</div>
        <div class="box main">Main Content</div>
        <div class="box right">Right Aside</div>
        <div class="box low">Low Content</div>
        <div class="box footer">Footer</div>
    </div>
</body>
</html>
