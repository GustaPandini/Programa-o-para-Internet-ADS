<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

</head>
<body>

    <h1>Entre em Contato</h1>
    
    <div>
        <p><strong>Atenção:</strong> Utilize o formulário abaixo para me enviar uma mensagem.</p>
    </div>

    <hr>

    <ul>
        <li><a href="index.html">Página Inicial</a></li>
        <li><a href="historia.html">História da Web</a></li>
        <li><a href="http.html">HTTP</a></li>
        <li><a href="curriculo.html">Voltar para o Currículo</a></li>
    </ul>

    <hr>

    <h2>Formulário de Mensagem</h2>

    <form action="#" method="POST">
        
        <div>
            <label for="nome">Nome Completo *:</label><br>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo" required>
        </div>
        <br>

        <div>
            <label for="email">E-mail *:</label><br>
            <input type="email" id="email" name="email" placeholder="exemplo@email.com" required>
        </div>
        <br>

        <div>
            <label for="assunto">Assunto:</label><br>
            <input type="text" id="assunto" name="assunto" placeholder="Dúvida, sugestão, freela...">
        </div>
        <br>

        <div>
            <label for="estado">Estado:</label><br>
            <select id="estado" name="estado">
                <option value="" disabled selected>Selecione um estado...</option>
                <option value="SC">Santa Catarina</option>
                <option value="PR">Paraná</option>
                <option value="RS">Rio Grande do Sul</option>
                <option value="SP">São Paulo</option>
                <option value="OUTRO">Outro Estado / País</option>
            </select>
        </div>
        <br>

        <div>
            <label for="mensagem">Sua Mensagem:</label><br>
            <textarea id="mensagem" name="mensagem" rows="6" cols="50" placeholder="Escreva aqui os detalhes da sua mensagem"></textarea>
        </div>
        <br>

        <div>
            <button type="submit">Enviar Mensagem</button>
        </div>

    </form>

    </body>
</html>
