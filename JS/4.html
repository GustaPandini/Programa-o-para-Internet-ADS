<!DOCTYPE html>
<html lang="pt-BR" id="html-root">
<head id="head-section">
    <meta charset="UTF-8" id="meta-charset">
    <title id="page-title">Sorteio de Números</title>
</head>
<body id="body-section">

    <h1 id="titulo-principal">Sorteio de Números</h1>

    <label for="minimo" id="label-min">Mínimo:</label>
    <input type="number" id="minimo" value="1"><br><br>

    <label for="maximo" id="label-max">Máximo:</label>
    <input type="number" id="maximo" value="100"><br><br>

    <button id="btn-sortear" onclick="sortear()">Sortear</button>

    <p id="resultado"></p>

    <ul id="lista-sorteados"></ul>

    <script id="script-sorteio">
        var sorteados = [];

        function sortear() {
            var min = parseInt(document.getElementById("minimo").value);
            var max = parseInt(document.getElementById("maximo").value);

            if (isNaN(min) || isNaN(max) || min > max) {
                alert("Intervalo inválido");
                return;
            }

            var numero = Math.floor(Math.random() * (max - min + 1)) + min;
            document.getElementById("resultado").innerText = "Resultado: " + numero;

            var jaExiste = false;

            for (var i = 0; i < sorteados.length; i++) {
                if (sorteados[i].valor === numero) {
                    sorteados[i].quantidade++;
                    jaExiste = true;
                    break;
                }
            }

            if (jaExiste === false) {
                sorteados.push({ valor: numero, quantidade: 1 });
            }

            exibirLista();
        }

        function exibirLista() {
            var lista = document.getElementById("lista-sorteados");
            lista.innerHTML = "";

            for (var i = 0; i < sorteados.length; i++) {
                var item = document.createElement("li");
                
                if (sorteados[i].quantidade > 1) {
                    item.innerText = sorteados[i].valor + " - sorteado " + sorteados[i].quantidade + " vezes";
                } else {
                    item.innerText = sorteados[i].valor;
                }
                
                lista.appendChild(item);
            }
        }
    </script>

</body>
</html>
