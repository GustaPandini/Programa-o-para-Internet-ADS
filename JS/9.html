<!DOCTYPE html>
<html lang="pt-BR" id="html-root">
<head id="head-section">
    <meta charset="UTF-8" id="meta-charset">
    <title id="page-title">Calculadora Aritmética</title>
</head>
<body id="body-section">
    <label for="num1" id="lbl-num1">Número 1:</label>
    <input type="number" id="num1"><br><br>

    <label for="num2" id="lbl-num2">Número 2:</label>
    <input type="number" id="num2"><br><br>

    <button id="btn-somar" onclick="calcular('+')">+</button>
    <button id="btn-subtrair" onclick="calcular('-')">-</button>
    <button id="btn-multiplicar" onclick="calcular('*')">*</button>
    <button id="btn-dividir" onclick="calcular('/')">/</button>

    <br><br>
    <p id="resultado"></p>

    <script id="main-script">
        function calcular(operador) {
            var valor1 = document.getElementById("num1").value;
            var valor2 = document.getElementById("num2").value;
            var pResultado = document.getElementById("resultado");

            if (valor1 === "" || valor2 === "") {
                pResultado.innerText = "Preencha os dois números.";
                return;
            }

            var num1 = parseFloat(valor1);
            var num2 = parseFloat(valor2);
            var total = 0;

            if (operador === '+') {
                total = num1 + num2;
            } else if (operador === '-') {
                total = num1 - num2;
            } else if (operador === '*') {
                total = num1 * num2;
            } else if (operador === '/') {
                if (num2 === 0) {
                    pResultado.innerText = "Não é possível dividir por zero.";
                    return;
                }
                total = num1 / num2;
            }

            pResultado.innerText = "Resultado: " + total;
        }
    </script>

</body>
</html>
